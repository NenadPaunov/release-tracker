services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: release-tracker-app
    ports:
      - "9094:8080"
    environment:
      - TZ=Europe/Belgrade
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/release_tracker_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/neon
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_CH_NEON=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
      - JAVA_OPTS=-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - keycloak-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: release-tracker-postgres
    environment:
      - TZ=Europe/Belgrade
      - PGTZ=Europe/Belgrade
      - POSTGRES_DB=release_tracker_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "6545:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - keycloak-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d release_tracker_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    container_name: release-tracker-keycloak
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    environment:
      - TZ=Europe/Belgrade
      - PGTZ=Europe/Belgrade
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak?useSSL=false
      - KC_DB_USERNAME=admin
      - KC_DB_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_LOGLEVEL=INFO
    ports:
      - "9092:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
      - ./keycloak-themes:/opt/keycloak/themes:ro
    networks:
      - keycloak-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  keycloak_data:
    driver: local

networks:
  keycloak-network:
    driver: bridge