spring:
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/realms/test

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    root: INFO
    ch.neon.releasetracker: DEBUG
    org.testcontainers: WARN
    com.github.dockerjava: WARN
